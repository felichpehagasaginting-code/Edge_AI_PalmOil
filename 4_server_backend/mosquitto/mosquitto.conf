###############################################################################
# FILE: mosquitto/mosquitto.conf
# PROJECT: Edge AI Palm Oil FFB (TBS) Grading System — Server Backend
# DESCRIPTION:
#   Eclipse Mosquitto 2.0.18 MQTT broker configuration.
#   Provides authenticated connections on TCP port 1883 and WebSocket port 9001.
###############################################################################

# ── Global: Persistence ───────────────────────────────────────────────────────
persistence true
persistence_location /mosquitto/data/
persistence_file mosquitto.db

# ── Global: Logging ───────────────────────────────────────────────────────────
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# ── Global: Security ──────────────────────────────────────────────────────────
allow_anonymous false

# Password file — set globally BEFORE any listener blocks.
# File must be owned by uid 1883 (mosquitto user) with chmod 600.
password_file /mosquitto/config/passwd

# ── Global: Message Limits ────────────────────────────────────────────────────
# Maximum MQTT packet size: 64 KB (FFB result payload is ~100 bytes)
max_packet_size 65536

# Maximum in-flight messages per client (QoS 1 reliability)
max_inflight_messages 20

# Maximum queued messages for offline clients
max_queued_messages 100

# ── Listener 1: TCP port 1883 (MQTT) ─────────────────────────────────────────
listener 1883 0.0.0.0
max_connections 100

# ── Listener 2: TCP port 9001 (MQTT-over-WebSocket) ──────────────────────────
# Used by MQTT Explorer browser tool and the web dashboard frontend.
listener 9001 0.0.0.0
protocol websockets
max_connections 20
