###############################################################################
# FILE: mosquitto/mosquitto.conf
# PROJECT: Edge AI Palm Oil FFB (TBS) Grading System — Server Backend
# DESCRIPTION:
#   Eclipse Mosquitto 2.x MQTT broker configuration for factory IoT deployment.
#   Provides authenticated connections on TCP port 1883 and WebSocket port 9001.
#
# PASSWORD FILE GENERATION:
#   Before starting, generate the passwd file with:
#   docker run --rm -it eclipse-mosquitto:2.0.18 sh -c \
#     "mosquitto_passwd -c /tmp/passwd iot_gateway && cat /tmp/passwd"
#   Paste the output into mosquitto/passwd
#
# SECURITY HARDENING (for production internet exposure):
#   - Enable TLS on port 8883 with server certificate
#   - Generate certs: https://mosquitto.org/man/mosquitto-tls-7.html
#   - Set cafile, certfile, keyfile in tls_listener section
###############################################################################

# ── Persistence ───────────────────────────────────────────────────────────────
# Persist retained messages and QoS 1/2 queues to disk so they survive restarts.
persistence true
persistence_location /mosquitto/data/
persistence_file mosquitto.db

# ── Logging ───────────────────────────────────────────────────────────────────
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# Maximum log file size before rotation (5 MB)
log_file_maxsize 5242880
log_file_count 5

# ── Global Security ───────────────────────────────────────────────────────────
# In Mosquitto 2.x, all anonymous access is disabled by default.
# Allow only authenticated connections.
allow_anonymous false

# ── TCP Listener (Port 1883) ──────────────────────────────────────────────────
listener 1883 0.0.0.0

# Authentication: password file
password_file /mosquitto/config/passwd

# Maximum number of simultaneous client connections
max_connections 100

# ── WebSocket Listener (Port 9001) ───────────────────────────────────────────
# Useful for MQTT Explorer browser tool and web-based dashboards.
listener 9001 0.0.0.0
protocol websockets
password_file /mosquitto/config/passwd
max_connections 20

# ── Connection Tuning ─────────────────────────────────────────────────────────
# Maximum payload size (bytes). FFB result payload is ~100 bytes — very small.
message_size_limit 65536  # 64 KB max (safety limit)

# Keepalive: server-side maximum keepalive interval
max_keepalive 120  # 120 seconds (clients should set keepalive <= this)

# ── QoS & Message Queue ───────────────────────────────────────────────────────
# Maximum messages in the in-flight window per client (QoS 1 reliability)
max_inflight_messages 20

# Maximum queued messages for offline clients
max_queued_messages 100

# ── Retained Message Expiry ───────────────────────────────────────────────────
# Expire retained messages after 24 hours (86400 seconds).
# Prevents stale grading data from being served to new Grafana subscriptions.
retained_message_expiry 86400

# ── ACL (Access Control List) ─────────────────────────────────────────────────
# Optional: Restrict which users can publish/subscribe to which topics.
# Uncomment and create mosquitto/acl.conf to enable topic-level access control.
#
# acl_file /mosquitto/config/acl.conf
#
# Example acl.conf content:
#   user iot_gateway
#   topic readwrite pks/grading/tbs/#
#
#   user mqtt_to_db
#   topic read pks/grading/tbs/result
#
#   user grafana_dashboard
#   topic read pks/grading/tbs/#
