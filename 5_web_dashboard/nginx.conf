###############################################################################
# FILE: 5_web_dashboard/nginx.conf
# Reverse proxy: serves static frontend + proxies /api/* to FastAPI
###############################################################################

server {
    listen 80;
    server_name _;

    # Gzip for JS/CSS/HTML performance
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 1024;

    # ── Static frontend files ─────────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # Cache static assets (CSS, JS, fonts) for 1 hour
    location ~* \.(css|js|woff2?|png|svg|ico)$ {
        expires 1h;
        add_header Cache-Control "public";
    }

    # ── API proxy to FastAPI backend ──────────────────────────────────────
    location /api/ {
        proxy_pass         http://dashboard_api:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        "";
        proxy_read_timeout 10s;
        proxy_connect_timeout 5s;

        # CORS preflight passthrough
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  *;
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Access-Control-Max-Age       3600;
            return 204;
        }
    }

    # Health endpoint proxy
    location /health {
        proxy_pass http://dashboard_api:8000/health;
    }

    # Timeout settings
    keepalive_timeout 65;
    client_max_body_size 1m;
}
